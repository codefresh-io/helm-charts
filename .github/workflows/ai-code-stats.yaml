name: AI Code Stats

on:
  pull_request:
    branches:
      - master
    types:
      - opened
      - reopened
      - synchronize

concurrency:
  group: ${{ github.head_ref }}-ai-code-stats
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  generate-stats:
    runs-on: ubuntu-latest
    container:
      image: quay.io/codefresh/git-ai:0.0.1-featadd-git-ai-container
      credentials:
        username: ${{ secrets.QUAY_USERNAME }}
        password: ${{ secrets.QUAY_PASSWORD }}
    outputs:
      comment-body: ${{ steps.stats.outputs.body }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Fetch Git Notes
        run: git fetch origin "refs/notes/*:refs/notes/*" || true

      - name: Generate stats comment
        id: stats
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -eu
          RANGE="${BASE_SHA}..${HEAD_SHA}"
          MARKER="<!-- ai-code-stats -->"

          BODY=""
          if JSON=$(git-ai stats "$RANGE" --json 2>/dev/null); then
            STATS=$(echo "$JSON" | jq 'if .range_stats then .range_stats else . end')
            HUMAN=$(echo "$STATS" | jq -r '.human_additions // 0')
            AI=$(echo "$STATS" | jq -r '.ai_additions // 0')
            MIXED=$(echo "$STATS" | jq -r '.mixed_additions // 0')
            AI_ACCEPTED=$(echo "$STATS" | jq -r '.ai_accepted // 0')
            TOTAL=$((HUMAN + AI + MIXED))

            if [ "$TOTAL" -gt 0 ]; then
              HUMAN_PCT=$(( (HUMAN * 1000 / TOTAL + 5) / 10 ))
              AI_PCT=$(( (AI * 1000 / TOTAL + 5) / 10 ))
              MIXED_PCT=$(( (MIXED * 1000 / TOTAL + 5) / 10 ))

              # Build emoji progress bar (20 blocks)
              BAR=""
              i=0; while [ $i -lt $((HUMAN_PCT * 20 / 100)) ]; do BAR="${BAR}🟦"; i=$((i+1)); done
              i=0; while [ $i -lt $((AI_PCT * 20 / 100)) ]; do BAR="${BAR}🟧"; i=$((i+1)); done
              i=0; while [ $i -lt $((MIXED_PCT * 20 / 100)) ]; do BAR="${BAR}🟪"; i=$((i+1)); done

              BREAKDOWN=$(echo "$STATS" | jq -r '
                .tool_model_breakdown // {} | to_entries[] |
                "| \(.key) | \(.value.ai_additions) | \(.value.mixed_additions) |"
              ' 2>/dev/null || true)

              BODY="${MARKER}
          ## 🤖 AI Code Attribution

          ${BAR}

          | Category | Lines | Percentage |
          |----------|------:|:-----------|
          | 🟦 Human | ${HUMAN} | ${HUMAN_PCT}% |
          | 🟧 AI-generated | ${AI} | ${AI_PCT}% |
          | 🟪 Mixed (AI + Human edits) | ${MIXED} | ${MIXED_PCT}% |
          | **Total** | **${TOTAL}** | |

          > **AI-accepted lines:** ${AI_ACCEPTED} (committed without human modification)

          <details>
          <summary>Tool & model breakdown</summary>

          | Tool :: Model | AI lines | Mixed lines |
          |---------------|----------|-------------|
          ${BREAKDOWN}

          </details>

          ---
          <sub>Powered by <a href=\"https://usegitai.com\">git-ai</a> | Commit range: <code>${RANGE}</code></sub>"
            fi
          fi

          if [ -z "$BODY" ]; then
            BODY="${MARKER}
          ## 🤖 AI Code Attribution

          > ℹ️ **No AI attribution data found** for this PR.
          >
          > This means either:
          > - The commits were written without an AI coding agent, or
          > - The AI agent was not configured with [git-ai](https://usegitai.com) to record attribution data.
          >
          > To start tracking AI contributions, install git-ai locally:
          > \`\`\`
          > curl -sSL https://usegitai.com/install.sh | bash
          > \`\`\`

          ---
          <sub>Powered by <a href=\"https://usegitai.com\">git-ai</a> | Commit range: <code>${RANGE}</code></sub>"
          fi

          echo "--- Generated comment body ---"
          echo "$BODY"

          {
            echo "body<<GHEOF"
            echo "$BODY"
            echo "GHEOF"
          } >> "$GITHUB_OUTPUT"

  post-comment:
    runs-on: ubuntu-latest
    needs: generate-stats
    steps:
      - name: Post or update PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          COMMENT_BODY: ${{ needs.generate-stats.outputs.comment-body }}
        run: |
          set -eu
          MARKER="<!-- ai-code-stats -->"

          EXISTING_COMMENT_ID=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --jq ".[] | select(.body | contains(\"${MARKER}\")) | .id" | head -1)

          if [ -n "$EXISTING_COMMENT_ID" ]; then
            gh api "repos/${{ github.repository }}/issues/comments/${EXISTING_COMMENT_ID}" \
              --method PATCH --field body="$COMMENT_BODY"
            echo "Updated existing comment ${EXISTING_COMMENT_ID}"
          else
            gh pr comment "$PR_NUMBER" --body "$COMMENT_BODY"
            echo "Created new comment"
          fi
