# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: pod monitor metadata
templates:
  - templates/podMonitor.yaml
tests:
  - it: Test pod monitor default metadata
    values:
      - values.yaml
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: PodMonitor
      - notExists:
          path: metadata.annotations
      - equal:
          path: metadata.labels
          value:
            app.kubernetes.io/instance: RELEASE-NAME
            app.kubernetes.io/managed-by: Helm
            app.kubernetes.io/name: cf-common-test
            helm.sh/chart: cf-common-test-0.0.0
      - equal:
          path: metadata.name
          value: RELEASE-NAME-cf-common-test

  - it: Test pod monitor custom metadata
    values:
      - values.yaml
    set:
      podMonitor:
        main:
          labels:
            alice: bob
          annotations:
            foo: bar
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: PodMonitor
      - equal:
          path: metadata.annotations
          value:
            foo: bar
      - equal:
          path: metadata.labels
          value:
            app.kubernetes.io/instance: RELEASE-NAME
            app.kubernetes.io/managed-by: Helm
            app.kubernetes.io/name: cf-common-test
            helm.sh/chart: cf-common-test-0.0.0
            alice: bob

  - it: Test main pod monitor with name override
    template: templates/podMonitor.yaml
    values:
      - values.yaml
    set:
      podMonitor:
        main:
          nameOverride: foobar
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-cf-common-test-foobar

  - it: Test main pod monitor with full name override
    template: templates/podMonitor.yaml
    values:
      - values.yaml
    set:
      podMonitor:
        main:
          fullnameOverride: foobar
    asserts:
      - equal:
          path: metadata.name
          value: foobar
