# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: sts error handlers
templates:
  - templates/controller.yaml
values:
  - values.yaml
tests:
  - it: Test invalid controller strategy for sts
    values:
      - values.yaml
    set:
      controller:
        strategy: RollingStones
    asserts:
      - failedTemplate:
          errorMessage: "ERROR: RollingStones is invalid controller strategy for Stateful Set!"

  - it: Test invalid sts podManagementPolicy
    values:
      - values.yaml
    set:
      controller:
        podManagementPolicy: Sequential
    asserts:
      - failedTemplate:
          errorMessage: "ERROR: Sequential is invalid Stateful Set podManagementPolicy!"
