controller:
  enabled: true
  type: deployment

container:
  image:
    registry: 839151377425.dkr.ecr.us-east-1.amazonaws.com/codefresh-inc
    repository: codefresh/cf-api
    tag: master
    pullPolicy: Always

  command:
    - "/bin/sh"
  args:
    - "-c"
    - "sleep infinity"

secrets:
  secret:
    enabled: true
    nameOverride: secret
    stringData:
      FOO: "bar"
